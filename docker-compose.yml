services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/ebooks.db
      - BACKEND_URL=http://187.127.189.33:8080
      - CORS_ORIGINS=http://187.127.189.33:8080
    volumes:
      - app_data:/app/data
      - app_static:/app/static
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://187.127.189.33:8080/api
    environment:
      - NEXT_PUBLIC_API_URL=http://187.127.189.33:8080/api
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  app_data:
  app_static:
